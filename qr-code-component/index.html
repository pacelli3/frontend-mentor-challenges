<!doctype html>
<html dir="ltr" lang="en">
    <head>
        <!-- Display stie properly based on user's device -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Metadata -->
        <title>Frontend Mentor | QR code component</title>
        <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap"
            rel="stylesheet"
        />

        <!-- CSS -->
        <link rel="stylesheet" href="/src/style.css" />
    </head>
    <body class="bg-light grid text-accent">
        <main class="main container flex">
            <figure class="qr-code bg-white grid">
                <img src="/src/assets/image-qr-code.png" alt="qr code" />
                <figcaption class="flow">
                    <h1 class="text-dark fs-200 fw-bold">
                        Improve your front-end skills by building projects
                    </h1>
                    <p class="fs-100">
                        Scan the QR code to visit Frontend Mentor and take your coding skills to the
                        next level
                    </p>
                </figcaption>
            </figure>
        </main>

        <footer class="attribution flex">
            <p class="text-dark">
                Challenge by
                <a
                    class="link"
                    href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by
                <a
                    class="link"
                    href="https://www.frontendmentor.io/profile/pacelli3"
                    target="_blank"
                    >Pacelli</a
                >.
            </p>
        </footer>
    </body>
</html>
