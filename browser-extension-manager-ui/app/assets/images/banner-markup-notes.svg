<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="auto">
  <defs>
    <filter id="windowShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="urlBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3e3e3"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Desktop background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Browser window -->
  <g filter="url(#windowShadow)">
    <rect x="60" y="30" width="1160" height="660" rx="12" fill="#ffffff" stroke="#c0c0c0" stroke-width="1"/>
    <rect x="60" y="30" width="1160" height="48" rx="12" fill="#e8e8e8"/>
    <rect x="60" y="42" width="1160" height="36" fill="#e8e8e8"/>

    <!-- macOS traffic lights -->
    <circle cx="86" cy="54" r="7" fill="#ff5f56"/>
    <circle cx="106" cy="54" r="7" fill="#ffbd2e"/>
    <circle cx="126" cy="54" r="7" fill="#27c93f"/>

    <!-- URL bar -->
    <rect x="200" y="38" width="980" height="32" rx="6" fill="url(#urlBarGrad)" stroke="#bcbcbc" stroke-width="0.5"/>
    <text x="214" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">https://www.speedboost-demo.dev</text>
  </g>

  <!-- Content area -->
  <g transform="translate(76, 94)">
    <!-- Extension UI box -->
    <rect x="0" y="0" width="1128" height="580" rx="16" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Extension header -->
    <rect x="0" y="0" width="1128" height="92" rx="16" fill="#ffffff" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Logo (provided) -->
    <g transform="translate(24, 16)">
      <path fill="#90DBF4" d="M0 10C0 4.477 4.477 0 10 0h40c5.523 0 10 4.477 10 10v40c0 5.523-4.477 10-10 10H10C4.477 60 0 55.523 0 50V10Z"/>
      <path fill="#091540" fill-rule="evenodd" d="M36.358 23.648c.897.01 2.144.014 3.201.01.541-.002.816-.655.442-1.05-.68-.712-1.624-1.705-2.574-2.702l-2.606-2.738c-.386-.404-1.058-.126-1.058.434v3.425c0 1.437 1.172 2.621 2.595 2.621Z" clip-rule="evenodd"/>
      <path fill="#091540" fill-rule="evenodd" d="M29.558 33.507h-6.306a1 1 0 1 1 0-2h6.306a1 1 0 0 1 0 2Zm-6.307-7.504h3.292a1 1 0 0 1 0 2H23.25a1 1 0 1 1 0-2Zm10.743 5.819a4.078 4.078 0 0 1 5.565-1.494l1.04.602c.043.024.076.057.116.084V26.13a.58.58 0 0 0-.579-.584h-3.95c-2.354-.013-4.296-1.963-4.296-4.34v-4.185a.593.593 0 0 0-.592-.598h-6.871c-3.203 0-5.803 2.638-5.803 5.86v14.008c0 3.38 2.728 6.122 6.074 6.122h5.778c-.05-.152-.11-.3-.142-.459l-.18-.892a5.248 5.248 0 0 1 .6-3.632l3.24-5.61Z" clip-rule="evenodd"/>
      <path fill="#091540" fill-rule="evenodd" d="m39.322 34.975-3.237 5.606c-.19.328-.492.576-.848.699l-.9.275-.179-.896c-.073-.371-.01-.758.18-1.086l3.237-5.608a.411.411 0 0 1 .558-.149l1.04.6a.41.41 0 0 1 .15.559Zm.85-2.291-1.04-.6a2.41 2.41 0 0 0-3.287.881l-3.24 5.61a3.57 3.57 0 0 0-.408 2.474l.178.895a2.025 2.025 0 0 0 2.635 1.524l.868-.295a3.563 3.563 0 0 0 1.939-1.592l3.238-5.608a2.415 2.415 0 0 0-.882-3.289Z" clip-rule="evenodd"/>
    </g>

    <!-- Name and description -->
    <text x="96" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">Markup Notes</text>
    <text x="96" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Enables annotation and notes directly onto webpages for collaborative debugging.</text>

    <!-- Mock page content -->
    <rect x="20" y="112" width="1088" height="448" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Gauge label and icon (now showing a pencil for annotations) -->
    <text x="930" y="510" font-family="system-ui, sans-serif" font-size="11" fill="#888">Active Notes</text>
    <g transform="translate(960, 524)">
      <circle cx="24" cy="24" r="24" fill="#FFCFD2" />
      <!-- Pencil icon -->
      <path d="M16 14 L34 32 L30 36 L12 18 Z" fill="#091540" />
      <path d="M12 18 L10 20 L14 24 L16 22 Z" fill="#091540" />
    </g>

    <!-- Dashboard content tailored to annotation/collaboration -->
    <text x="44" y="144" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">Annotation &amp; Collaboration Speed</text>

    <text x="44" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#aaa" text-decoration="line-through">Manual screenshot &amp; email: 5.2s</text>

    <text x="44" y="198" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">With Markup Notes: 0.6s ✓</text>

    <!-- Green progress bar (unchanged layout) -->
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#e0e0e0"/>
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#4CAF50"/>

    <!-- Placeholder content replaced with recent annotations -->
    <text x="44" y="250" font-family="system-ui, sans-serif" font-size="13" fill="#555">Live annotations on current page:</text>
    
    <rect x="44" y="260" width="340" height="16" rx="3" fill="#f0f0f0"/>
    <text x="50" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#666">/* Fix button alignment */ — 1 min ago</text>
    
    <rect x="44" y="286" width="280" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="296" font-family="system-ui, sans-serif" font-size="11" fill="#666">// Check API response here — 3 mins ago</text>
    
    <rect x="44" y="306" width="300" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#666">TODO: Update font weight — 10 mins ago</text>
    
    <rect x="44" y="330" width="260" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="340" font-family="system-ui, sans-serif" font-size="11" fill="#666">📌 Review this section — 20 mins ago</text>

    <!-- Resource usage pills (kept layout, updated for lightweight annotation) -->
    <rect x="44" y="370" width="140" height="20" rx="10" fill="#FFCFD2" opacity="0.3"/>
    <text x="54" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">CPU −6%</text>

    <rect x="200" y="370" width="140" height="20" rx="10" fill="#BFD8BD" opacity="0.4"/>
    <text x="210" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">Memory −10%</text>
  </g>
</svg>