<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="auto">
  <defs>
    <filter id="windowShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="urlBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3e3e3"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Desktop background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Browser window -->
  <g filter="url(#windowShadow)">
    <rect x="60" y="30" width="1160" height="660" rx="12" fill="#ffffff" stroke="#c0c0c0" stroke-width="1"/>
    <rect x="60" y="30" width="1160" height="48" rx="12" fill="#e8e8e8"/>
    <rect x="60" y="42" width="1160" height="36" fill="#e8e8e8"/>

    <!-- macOS traffic lights -->
    <circle cx="86" cy="54" r="7" fill="#ff5f56"/>
    <circle cx="106" cy="54" r="7" fill="#ffbd2e"/>
    <circle cx="126" cy="54" r="7" fill="#27c93f"/>

    <!-- URL bar -->
    <rect x="200" y="38" width="980" height="32" rx="6" fill="url(#urlBarGrad)" stroke="#bcbcbc" stroke-width="0.5"/>
    <text x="214" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">https://www.speedboost-demo.dev</text>
  </g>

  <!-- Content area -->
  <g transform="translate(76, 94)">
    <!-- Extension UI box -->
    <rect x="0" y="0" width="1128" height="580" rx="16" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Extension header -->
    <rect x="0" y="0" width="1128" height="92" rx="16" fill="#ffffff" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Logo (provided) -->
    <g transform="translate(24, 16)">
      <path fill="#FFD8BE" d="M0 10C0 4.477 4.477 0 10 0h40c5.523 0 10 4.477 10 10v40c0 5.523-4.477 10-10 10H10C4.477 60 0 55.523 0 50V10Z"/>
      <path fill="#091540" fill-rule="evenodd" d="M23.955 21.853c.738 0 1.334-.596 1.334-1.333V18a1.333 1.333 0 1 0-2.667 0v2.52c0 .737.596 1.333 1.333 1.333ZM21.85 23.958c0-.737-.596-1.333-1.333-1.333H18a1.333 1.333 0 1 0 0 2.667h2.516c.737 0 1.333-.596 1.333-1.334ZM36.048 38.146c-.738 0-1.334.596-1.334 1.333V42a1.333 1.333 0 1 0 2.667 0v-2.52c0-.737-.596-1.333-1.333-1.333ZM42 34.708h-2.517a1.333 1.333 0 1 0 0 2.667H42a1.332 1.332 0 1 0 0-2.667ZM31.604 36.127l-1.31 1.316c-2.136 2.129-5.606 2.13-7.736.002a5.48 5.48 0 0 1 0-7.738l1.311-1.308a1.335 1.335 0 0 0-1.883-1.89l-1.313 1.31c-3.17 3.174-3.17 8.337 0 11.511a8.101 8.101 0 0 0 5.748 2.375c2.084 0 4.17-.792 5.76-2.377l1.314-1.32a1.332 1.332 0 1 0-1.891-1.88ZM41.552 26.579a8.085 8.085 0 0 0-2.375-5.761c-3.166-3.167-8.326-3.167-11.506 0l-1.32 1.32a1.332 1.332 0 0 0 0 1.885c.52.521 1.364.521 1.885 0l1.319-1.319c2.136-2.128 5.606-2.132 7.737-.001a5.437 5.437 0 0 1 1.593 3.875c0 1.466-.566 2.84-1.593 3.865l-1.323 1.321a1.334 1.334 0 0 0 1.887 1.886l1.321-1.322a8.076 8.076 0 0 0 2.375-5.749Z" clip-rule="evenodd"/>
    </g>

    <!-- Name and description -->
    <text x="96" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">LinkChecker</text>
    <text x="96" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Scans and highlights broken links on any page.</text>

    <!-- Mock page content -->
    <rect x="20" y="112" width="1088" height="448" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Gauge label and icon (now showing a broken chain link) -->
    <text x="930" y="510" font-family="system-ui, sans-serif" font-size="11" fill="#888">Scan Status</text>
    <g transform="translate(960, 524)">
      <circle cx="24" cy="24" r="24" fill="#FFCFD2" />
      <!-- Broken chain link icon -->
      <rect x="15" y="18" width="10" height="12" rx="4" fill="none" stroke="#091540" stroke-width="2"/>
      <path d="M25 18 h8 a 4 4 0 0 1 0 8 h-8" fill="none" stroke="#091540" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Dashboard content tailored to link scanning -->
    <text x="44" y="144" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">Link Scanning Speed</text>

    <text x="44" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#aaa" text-decoration="line-through">Manual link checking: 12.4s</text>

    <text x="44" y="198" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">With LinkChecker: 0.8s ✓</text>

    <!-- Green progress bar (unchanged layout) -->
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#e0e0e0"/>
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#4CAF50"/>

    <!-- Placeholder content replaced with recent scan results -->
    <text x="44" y="250" font-family="system-ui, sans-serif" font-size="13" fill="#555">Recent scan results:</text>
    
    <rect x="44" y="260" width="340" height="16" rx="3" fill="#f0f0f0"/>
    <text x="50" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#666">✓ example.com/contact (200 OK)</text>
    
    <rect x="44" y="286" width="320" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="296" font-family="system-ui, sans-serif" font-size="11" fill="#666">✗ old-blog.com/post (404 Not Found)</text>
    
    <rect x="44" y="306" width="330" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#666">✓ docs.example.org (200 OK)</text>
    
    <rect x="44" y="330" width="320" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="340" font-family="system-ui, sans-serif" font-size="11" fill="#666">✗ api.example.com/v1 (500 Server Error)</text>

    <!-- Resource usage pills (kept layout, updated for scanning) -->
    <rect x="44" y="370" width="140" height="20" rx="10" fill="#FFCFD2" opacity="0.3"/>
    <text x="54" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">CPU −6%</text>

    <rect x="200" y="370" width="140" height="20" rx="10" fill="#BFD8BD" opacity="0.4"/>
    <text x="210" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">Memory −8%</text>
  </g>
</svg>