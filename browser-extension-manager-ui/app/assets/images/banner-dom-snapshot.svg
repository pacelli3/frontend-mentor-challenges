<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="auto">
  <defs>
    <filter id="windowShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="urlBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3e3e3"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Desktop background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Browser window -->
  <g filter="url(#windowShadow)">
    <rect x="60" y="30" width="1160" height="660" rx="12" fill="#ffffff" stroke="#c0c0c0" stroke-width="1"/>
    <rect x="60" y="30" width="1160" height="48" rx="12" fill="#e8e8e8"/>
    <rect x="60" y="42" width="1160" height="36" fill="#e8e8e8"/>

    <!-- macOS traffic lights -->
    <circle cx="86" cy="54" r="7" fill="#ff5f56"/>
    <circle cx="106" cy="54" r="7" fill="#ffbd2e"/>
    <circle cx="126" cy="54" r="7" fill="#27c93f"/>

    <!-- URL bar -->
    <rect x="200" y="38" width="980" height="32" rx="6" fill="url(#urlBarGrad)" stroke="#bcbcbc" stroke-width="0.5"/>
    <text x="214" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">https://www.speedboost-demo.dev</text>
  </g>

  <!-- Content area -->
  <g transform="translate(76, 94)">
    <!-- Extension UI box -->
    <rect x="0" y="0" width="1128" height="580" rx="16" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Extension header -->
    <rect x="0" y="0" width="1128" height="92" rx="16" fill="#ffffff" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Logo (provided) -->
    <g transform="translate(24, 16)">
      <path fill="#8EECF5" d="M0 10C0 4.477 4.477 0 10 0h40c5.523 0 10 4.477 10 10v40c0 5.523-4.477 10-10 10H10C4.477 60 0 55.523 0 50V10Z"/>
      <path fill="#091540" fill-rule="evenodd" d="M41.752 29.78h-.701v-3.07a.58.58 0 0 0-.58-.583h-3.95c-2.357-.014-4.3-1.964-4.3-4.343v-4.185a.594.594 0 0 0-.593-.599h-6.873c-3.204 0-5.804 2.639-5.804 5.863v6.917h-.703a1 1 0 0 0 0 2h23.504a1 1 0 0 0 0-2Z" clip-rule="evenodd"/>
      <path fill="#091540" fill-rule="evenodd" d="M36.69 24.227c.898.01 2.145.013 3.203.01.542-.002.818-.657.442-1.05-.679-.712-1.624-1.707-2.575-2.704-.953-1.001-1.91-2.008-2.608-2.739-.384-.405-1.057-.126-1.057.434v3.426c0 1.439 1.172 2.623 2.596 2.623Z" clip-rule="evenodd"/>
      <path fill="#091540" fill-rule="evenodd" d="M40.582 33.333H19.418a.468.468 0 0 0-.468.468v3.076c0 3.38 2.728 6.123 6.075 6.123h10.233c3.206 0 5.792-2.612 5.792-5.836v-3.363a.468.468 0 0 0-.468-.468Z" clip-rule="evenodd" opacity=".4"/>
    </g>

    <!-- Name and description -->
    <text x="96" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">DOM Snapshot</text>
    <text x="96" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Capture and export DOM structures quickly.</text>

    <!-- Mock page content -->
    <rect x="20" y="112" width="1088" height="448" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Gauge label and icon (now showing a camera for snapshots) -->
    <text x="930" y="510" font-family="system-ui, sans-serif" font-size="11" fill="#888">Capture</text>
    <g transform="translate(960, 524)">
      <circle cx="24" cy="24" r="24" fill="#FFCFD2" />
      <!-- Camera / Snapshot icon -->
      <rect x="17" y="18" width="14" height="10" rx="2" fill="#091540" />
      <circle cx="24" cy="23" r="3.5" fill="#FFCFD2" stroke="#091540" stroke-width="1.5" />
      <rect x="27" y="18" width="2.5" height="1.5" rx="0.5" fill="#091540" />
    </g>

    <!-- Dashboard content tailored to DOM capture/export -->
    <text x="44" y="144" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">DOM Capture &amp; Export Speed</text>

    <text x="44" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#aaa" text-decoration="line-through">Manual DOM inspection: 4.1s</text>

    <text x="44" y="198" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">With DOM Snapshot: 0.2s ✓</text>

    <!-- Green progress bar (unchanged layout) -->
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#e0e0e0"/>
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#4CAF50"/>

    <!-- Placeholder content replaced with recent capture exports -->
    <text x="44" y="250" font-family="system-ui, sans-serif" font-size="13" fill="#555">Recent exported snapshots:</text>
    
    <rect x="44" y="260" width="340" height="16" rx="3" fill="#f0f0f0"/>
    <text x="50" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#666">dom_snapshot_2026-06-18.json — 1 min ago</text>
    
    <rect x="44" y="286" width="320" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="296" font-family="system-ui, sans-serif" font-size="11" fill="#666">index.html_dom.xml — 5 mins ago</text>
    
    <rect x="44" y="306" width="280" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#666">captured_structure.txt — 12 mins ago</text>
    
    <rect x="44" y="330" width="300" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="340" font-family="system-ui, sans-serif" font-size="11" fill="#666">page_body_snapshot.xml — 20 mins ago</text>

    <!-- Resource usage pills (kept layout, updated for lightweight capture) -->
    <rect x="44" y="370" width="140" height="20" rx="10" fill="#FFCFD2" opacity="0.3"/>
    <text x="54" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">CPU −4%</text>

    <rect x="200" y="370" width="140" height="20" rx="10" fill="#BFD8BD" opacity="0.4"/>
    <text x="210" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">Memory −6%</text>
  </g>
</svg>