<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="auto">
  <defs>
    <filter id="windowShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="urlBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3e3e3"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Desktop background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Browser window -->
  <g filter="url(#windowShadow)">
    <rect x="60" y="30" width="1160" height="660" rx="12" fill="#ffffff" stroke="#c0c0c0" stroke-width="1"/>
    <rect x="60" y="30" width="1160" height="48" rx="12" fill="#e8e8e8"/>
    <rect x="60" y="42" width="1160" height="36" fill="#e8e8e8"/>

    <!-- macOS traffic lights -->
    <circle cx="86" cy="54" r="7" fill="#ff5f56"/>
    <circle cx="106" cy="54" r="7" fill="#ffbd2e"/>
    <circle cx="126" cy="54" r="7" fill="#27c93f"/>

    <!-- URL bar -->
    <rect x="200" y="38" width="980" height="32" rx="6" fill="url(#urlBarGrad)" stroke="#bcbcbc" stroke-width="0.5"/>
    <text x="214" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">https://www.speedboost-demo.dev</text>
  </g>

  <!-- Content area -->
  <g transform="translate(76, 94)">
    <!-- Extension UI box -->
    <rect x="0" y="0" width="1128" height="580" rx="16" fill="#fafafa" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Extension header -->
    <rect x="0" y="0" width="1128" height="92" rx="16" fill="#ffffff" stroke="#dcdcdc" stroke-width="1"/>

    <!-- Logo (provided) -->
    <g transform="translate(24, 16)">
      <path fill="#98F5E1" d="M0 10C0 4.477 4.477 0 10 0h40c5.523 0 10 4.477 10 10v40c0 5.523-4.477 10-10 10H10C4.477 60 0 55.523 0 50V10Z"/>
      <path fill="#091540" fill-rule="evenodd" d="M21.599 18.342a4.342 4.342 0 0 0-4.334 4.334v2.24c0 .147.12.266.267.266 1.166-.003 5.855-.012 8.134-.013.148 0 .266-.12.266-.267v-2.226a4.333 4.333 0 0 0-4.333-4.334ZM17.532 27.157a.266.266 0 0 0-.267.266v4.158c0 .06.06.108.12.108h8.28c.148 0 .267-.12.267-.267v-3.986a.266.266 0 0 0-.266-.267c-2.28 0-6.968-.01-8.134-.012ZM21.599 36.21c.666 0 1.2.546 1.2 1.2 0 .666-.534 1.2-1.2 1.2-.654 0-1.2-.534-1.2-1.2 0-.654.546-1.2 1.2-1.2Zm-4.067-2.534a.266.266 0 0 0-.267.267v3.4c0 2.4 1.947 4.333 4.334 4.333 2.4 0 4.333-1.933 4.333-4.333v-3.387a.266.266 0 0 0-.266-.267c-2.28 0-6.968-.01-8.134-.013ZM38.637 23.86c-1.213-3.307-5.08-3.894-7.227-1.747l-3.35 3.324c-.1.1-.157.235-.157.376l-.026 5.22-.013 1.653v.013l-.024 4.593a.267.267 0 0 0 .455.19l9.355-9.343c1.12-1.12 1.534-2.786.987-4.28ZM38.897 33.015h-3.041a.534.534 0 0 0-.374.154l-8.186 8.056a.267.267 0 0 0 .187.457h11.562c1.582 0 3.062-.885 3.726-2.32 1.48-3.204-.836-6.347-3.874-6.347Z" clip-rule="evenodd"/>
    </g>

    <!-- Name and description -->
    <text x="96" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a">Palette Picker</text>
    <text x="96" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Instantly extracts color palettes from any webpage.</text>

    <!-- Mock page content -->
    <rect x="20" y="112" width="1088" height="448" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Gauge label and icon (now showing an eyedropper) -->
    <text x="930" y="510" font-family="system-ui, sans-serif" font-size="11" fill="#888">Live Pick</text>
    <g transform="translate(960, 524)">
      <circle cx="24" cy="24" r="24" fill="#FFCFD2" />
      <!-- Eyedropper icon -->
      <path d="M16 32 L28 20 L24 16 L12 28 Z" fill="#091540" />
      <path d="M28 20 L32 16 L30 14 L26 18 Z" fill="#091540" />
    </g>

    <!-- Dashboard content tailored to color palette extraction -->
    <text x="44" y="144" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333">Color Extraction Speed</text>

    <text x="44" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#aaa" text-decoration="line-through">Manual color sampling: 5.8s</text>

    <text x="44" y="198" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#4CAF50">With Palette Picker: 0.1s ✓</text>

    <!-- Green progress bar (unchanged layout) -->
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#e0e0e0"/>
    <rect x="44" y="220" width="600" height="10" rx="5" fill="#4CAF50"/>

    <!-- Placeholder content replaced with recently extracted colors -->
    <text x="44" y="250" font-family="system-ui, sans-serif" font-size="13" fill="#555">Extracted color palette:</text>
    
    <rect x="44" y="260" width="320" height="16" rx="3" fill="#f0f0f0"/>
    <text x="50" y="272" font-family="system-ui, sans-serif" font-size="11" fill="#666">Primary: #4CAF50 (Green)</text>
    
    <rect x="44" y="286" width="300" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="296" font-family="system-ui, sans-serif" font-size="11" fill="#666">Accent: #FF5722 (Orange)</text>
    
    <rect x="44" y="306" width="280" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#666">Background: #F5F5F5 (Gray)</text>
    
    <rect x="44" y="330" width="260" height="12" rx="2" fill="#e8e8e8"/>
    <text x="50" y="340" font-family="system-ui, sans-serif" font-size="11" fill="#666">Text: #212121 (Dark Gray)</text>

    <!-- Resource usage pills (kept layout, updated for lightweight picker) -->
    <rect x="44" y="370" width="140" height="20" rx="10" fill="#FFCFD2" opacity="0.3"/>
    <text x="54" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">CPU −2%</text>

    <rect x="200" y="370" width="140" height="20" rx="10" fill="#BFD8BD" opacity="0.4"/>
    <text x="210" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#333">Memory −4%</text>
  </g>
</svg>