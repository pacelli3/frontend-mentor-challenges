<!doctype html>
<html dir="ltr" lang="en">
    <head>
        <!-- Display site properly based on user's device -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Metadata -->
        <title>Frontend Mentor | Social links profile</title>
        <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />

        <!-- Font face -->
        <link
            rel="preload"
            href="./src/assets/fonts/inter-v20-latin-regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <link
            rel="preload"
            href="./src/assets/fonts/inter-v20-latin-600.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <link
            rel="preload"
            href="./src/assets/fonts/inter-v20-latin-800.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <!-- CSS -->
        <link rel="stylesheet" href="/src/style.css" />
    </head>

    <body class="bg-grey-900 grid text-preset-3 text-white">
        <main class="container">
            <article class="card bg-grey-800 flow m-top">
                <figure class="figure grid">
                    <img
                        src="/src/assets/images/avatar-jessica.jpeg"
                        alt=""
                        height="176"
                        width="176"
                    />

                    <figcaption class="grid">
                        <h1 class="text-preset-1">Jessica Randall</h1>

                        <address class="text-preset-2 text-green">
                            <span class="sr-only">Location:</span> London, United Kingdom
                        </address>

                        <p class="m-top text-preset-3">
                            <span class="sr-only">About me:</span> "Front-end developer and avid
                            reader."
                        </p>
                    </figcaption>
                </figure>

                <nav aria-label="social links.">
                    <ul class="grid">
                        <li><a class="link bg-grey-700 text-preset-2" href="#">GitHub</a></li>
                        <li>
                            <a class="link bg-grey-700 text-preset-2" href="#">Frontend Mentor</a>
                        </li>
                        <li><a class="link bg-grey-700 text-preset-2" href="#">LinkedIn</a></li>
                        <li><a class="link bg-grey-700 text-preset-2" href="#">Twitter</a></li>
                        <li><a class="link bg-grey-700 text-preset-2" href="#">Instagram</a></li>
                    </ul>
                </nav>
            </article>
        </main>

        <footer class="attribution container flex">
            <p class="text-gray-950 text-preset-3">
                Challenge by
                <a
                    class="link"
                    href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H"
                    target="_blank"
                    >Frontend Mentor</a
                >. Coded by
                <a
                    class="link"
                    href="https://www.frontendmentor.io/profile/pacelli3"
                    target="_blank"
                    >Pacelli</a
                >.
            </p>
        </footer>
    </body>
</html>
